<div id="nav" class="w-full px-1">
  @for (item of menuOptions; track item.route) {
  <a [routerLink]="item.route" routerLinkActive="bg-blue-800"
    class="w-full px-2 inline-flex space-x-2 items-center border-b border-slate-700 py-3  hover:bg-white/5 transition ease-linear duration-150">
    <div>
      <!-- <i class="{{item.icon}}"></i> -->
      <i [class]="item.icon"></i>
    </div>
    <div class="flex flex-col">
      <span class="text-lg font-bold leading-5 text-white">{{item.label}}</span>
      <span class="text-sm text-white/50 hidden md:block">{{item.sublabel}}</span>
    </div>
  </a>
  }
</div>
<div id="nav" class="w-full px-1">
  @for (item of gifService.searchHistoryKeys(); track $index) {
  <a [routerLink]="['/dashboard/history/',item]" routerLinkActive="bg-blue-800"
    class="w-full px-2 inline-flex space-x-2 items-center border-b border-slate-700 py-3  hover:bg-white/5 transition ease-linear duration-150">
    <div>
      <i class="fa-solid fa-clock-rotate-left"></i>
    </div>
    <div class="flex flex-col">
      <span class="text-lg font-bold leading-5 text-white">{{item}}</span>
      <!-- <span class="text-lg font-bold leading-5 text-white">{{item | titlecase}}</span> -->
      <!-- <span class="text-sm text-white/50 hidden md:block">fwfw</span> -->
    </div>
  </a>
  }
</div>
@if (gifService.searchHistoryKeys().length) {
  <div class="w-full px-1">
    <div class="btn hover:bg-red-700 text-white font-bold py-2 px-4  hover:cursor-pointer">
      <button class="btn hover:bg-red-700 text-white font-bold py-2 px-4 rounded hover:cursor-pointer"
        (click)="clearHistory()">Limpiar historial </button>
    </div>
  </div>
}
